name: Test Suite

permissions:
  contents: read

on:
  push:
    branches: [master, dev, 'feat/**', 'fix/**']
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

concurrency:
  # Include event_name in the group so push and pull_request runs on the
  # same ref do NOT cross-cancel. A push to dev with an open PR previously
  # had both events fire with identical group keys; cancel-in-progress
  # then killed the push run, leaving branch protection with a cancelled
  # required check. Separating the groups lets push run to completion
  # while skip-duplicate-actions short-circuits the concurrent PR run.
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Gate job: detects whether the PR/push contains any code-relevant
  # changes. Docs-only changes (**.md, src/docs/**, .claude/**) short-
  # circuit the expensive work but each required check still reports a
  # success status — this is the "dummy skip job" pattern that unblocks
  # the paths-ignore / branch-protection deadlock observed in PR #78.
  # ─────────────────────────────────────────────────────────────────────
  changes:
    name: Detect Code Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # pull-requests: read lets dorny/paths-filter use the GitHub API on PR
    # events instead of falling back to git-based detection.
    permissions:
      contents: read
      pull-requests: read
      actions: read
    outputs:
      # `code` — true if this push/PR touches non-docs files (see filters)
      # `duplicate` — true if a prior workflow run already completed
      #   successfully with the same tree hash (content-identical). The
      #   canonical case: push to dev passes, PR dev→master fires the
      #   same workflow on a synthetic merge SHA whose tree is identical,
      #   so the new run is a duplicate of work already validated.
      # `should_run` — true only when BOTH code changed AND no duplicate
      #   exists. Downstream jobs key off this single output.
      code: ${{ steps.filter.outputs.code }}
      matched-files: ${{ steps.filter.outputs.code_files }}
      duplicate: ${{ steps.skip_dup.outputs.should_skip }}
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - uses: actions/checkout@v5
      - id: skip_dup
        # Check if a prior workflow run already passed with the same tree
        # hash. Replaces fkirc/skip-duplicate-actions (Node 20 deprecated).
        # Queries the GitHub API for recent successful runs of this workflow,
        # compares their head SHA's tree hash against the current commit's
        # tree hash. If a match is found, the run is a duplicate.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_TREE=$(git rev-parse HEAD^{tree})
          echo "current_tree=$CURRENT_TREE"

          SHOULD_SKIP=false

          # Query last 10 successful runs of this workflow
          SHAS=$(gh api "repos/${{ github.repository }}/actions/workflows/test.yml/runs?status=success&per_page=10" \
            --jq '.workflow_runs[].head_sha' 2>/dev/null || echo "")

          for SHA in $SHAS; do
            # Fetch the tree hash for each successful run's commit
            TREE=$(gh api "repos/${{ github.repository }}/git/commits/$SHA" \
              --jq '.tree.sha' 2>/dev/null || echo "")
            if [ "$TREE" = "$CURRENT_TREE" ]; then
              echo "Duplicate found: commit $SHA has identical tree $TREE"
              SHOULD_SKIP=true
              break
            fi
          done

          echo "should_skip=$SHOULD_SKIP" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # For push events, compare against the previous commit on the
          # SAME branch. The action's default base is the repository's
          # default branch (master), which for a push to dev means the
          # diff spans ALL unmerged commits — not just this push. That
          # caused every push to dev to look like a full code change
          # regardless of what the push actually touched. Setting base
          # to the pushed branch triggers paths-filter's "same branch"
          # codepath: diff against `github.event.before`. Ignored on
          # pull_request events (per the action's docs).
          base: ${{ github.ref_name }}
          predicate-quantifier: 'every'
          # list-files: json emits the matched files as `<name>_files` so we
          # can log them for diagnostics. Without this, a broken filter
          # silently flips the gate and looks identical to a working one.
          list-files: json
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!src/docs/**'
              - '!.claude/**'
      - id: decide
        run: |
          if [ "${{ steps.filter.outputs.code }}" = "true" ] && [ "${{ steps.skip_dup.outputs.should_skip }}" != "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Log gate decision
        run: |
          echo "code=${{ steps.filter.outputs.code }}"
          echo "duplicate=${{ steps.skip_dup.outputs.should_skip }}"
          echo "should_run=${{ steps.decide.outputs.should_run }}"
          echo "matched files: ${{ steps.filter.outputs.code_files }}"

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes

    steps:
      - name: Checkout code
        if: needs.changes.outputs.should_run == 'true'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: needs.changes.outputs.should_run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        if: needs.changes.outputs.should_run == 'true'
        run: npm ci

      - name: Astro type check
        if: needs.changes.outputs.should_run == 'true'
        run: npx astro check

      - name: ESLint
        if: needs.changes.outputs.should_run == 'true'
        run: npm run lint

      - name: Stylelint
        if: needs.changes.outputs.should_run == 'true'
        run: npm run lint:css

      - name: Prettier check
        if: needs.changes.outputs.should_run == 'true'
        run: npx prettier --check .

      - name: npm audit (production dependencies only)
        if: needs.changes.outputs.should_run == 'true'
        run: npm audit --audit-level=moderate --omit=dev

      - name: Skipped (docs-only or duplicate run)
        if: needs.changes.outputs.should_run != 'true'
        run: |
          if [ "${{ needs.changes.outputs.duplicate }}" = "true" ]; then
            echo "Skipped — duplicate of a prior successful run (tree hash match)."
          else
            echo "Skipped — no code changes in this push/PR."
          fi

  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes

    steps:
      - name: Checkout code
        if: needs.changes.outputs.should_run == 'true'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: needs.changes.outputs.should_run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        if: needs.changes.outputs.should_run == 'true'
        run: npm ci

      - name: Run tests with coverage
        if: needs.changes.outputs.should_run == 'true'
        run: |
          npm run test:coverage 2>&1 | tee coverage-output.txt
          SUMMARY=$(grep "^All files" coverage-output.txt || echo "")
          if [ -n "$SUMMARY" ]; then
            STMTS=$(echo "$SUMMARY" | awk -F'|' '{gsub(/ /,"",$2); print $2}')
            BRANCH=$(echo "$SUMMARY" | awk -F'|' '{gsub(/ /,"",$3); print $3}')
            FUNCS=$(echo "$SUMMARY" | awk -F'|' '{gsub(/ /,"",$4); print $4}')
            LINES=$(echo "$SUMMARY" | awk -F'|' '{gsub(/ /,"",$5); print $5}')
            echo "## Code Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| Statements | ${STMTS}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | ${BRANCH}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions | ${FUNCS}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Lines | ${LINES}% |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Skipped (docs-only or duplicate run)
        if: needs.changes.outputs.should_run != 'true'
        run: |
          if [ "${{ needs.changes.outputs.duplicate }}" = "true" ]; then
            echo "Skipped — duplicate of a prior successful run (tree hash match)."
          else
            echo "Skipped — no code changes in this push/PR."
          fi

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes, lint-and-typecheck, unit-and-integration]

    steps:
      - name: Checkout code
        if: needs.changes.outputs.should_run == 'true'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: needs.changes.outputs.should_run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        if: needs.changes.outputs.should_run == 'true'
        run: npm ci

      - name: Get Playwright version
        if: needs.changes.outputs.should_run == 'true'
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        if: needs.changes.outputs.should_run == 'true'
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: needs.changes.outputs.should_run == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright deps (cached browsers)
        if: needs.changes.outputs.should_run == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Build application
        if: needs.changes.outputs.should_run == 'true'
        run: npm run build

      - name: Run E2E tests
        if: needs.changes.outputs.should_run == 'true'
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always() && needs.changes.outputs.should_run == 'true'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Skipped (docs-only or duplicate run)
        if: needs.changes.outputs.should_run != 'true'
        run: |
          if [ "${{ needs.changes.outputs.duplicate }}" = "true" ]; then
            echo "Skipped — duplicate of a prior successful run (tree hash match)."
          else
            echo "Skipped — no code changes in this push/PR."
          fi
